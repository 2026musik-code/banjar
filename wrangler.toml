name = "banjar"
compatibility_date = "2024-03-11"
main = "src/worker.ts"

[assets]
directory = "dist"

# Binding R2 Bucket
# Pastikan Anda telah membuat R2 bucket bernama "datauser" di dashboard Cloudflare Anda.
[[r2_buckets]]
binding = "datauser"
bucket_name = "datauser"

[vars]
# PENTING: Jangan masukkan API Key asli Anda di file ini jika akan di-commit ke GitHub.
# Tambahkan variabel GEMINI_API_KEY ini melalui Dashboard Cloudflare Anda:
# Buka Workers & Pages > zona-banjar-ai > Settings > Variables and Secrets
